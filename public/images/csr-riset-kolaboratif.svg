<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Circle border -->
  <circle cx="100" cy="100" r="94" fill="white" stroke="#B91C1C" stroke-width="3"/>

  <!-- Atom orbits -->
  <ellipse cx="100" cy="100" rx="60" ry="24" stroke="#B91C1C" stroke-width="2.5" fill="none" opacity="0.8" transform="rotate(-30 100 100)"/>
  <ellipse cx="100" cy="100" rx="60" ry="24" stroke="#B91C1C" stroke-width="2.5" fill="none" opacity="0.8" transform="rotate(30 100 100)"/>
  <ellipse cx="100" cy="100" rx="60" ry="24" stroke="#B91C1C" stroke-width="2.5" fill="none" opacity="0.8"/>

  <!-- Center nucleus -->
  <circle cx="100" cy="100" r="10" fill="#B91C1C"/>

  <!-- Gold molecular dots on orbits -->
  <circle cx="44" cy="78" r="7" fill="#D4A574"/>
  <circle cx="156" cy="122" r="7" fill="#D4A574"/>
  <circle cx="72" cy="156" r="7" fill="#D4A574"/>
  <circle cx="128" cy="44" r="7" fill="#D4A574"/>
</svg>
